      <h2 id="vim命令学习不定期更新"><a href="#vim命令学习不定期更新" class="headerlink" title="vim命令学习不定期更新"></a><label style="color:yellow">vim命令学习不定期更新</label></h2><a id="more"></a>
<h2 id="最近因为要使用vim-所以不定期更新新学到的vim干货-所有条目都将以“-gt-gt-gt-”开头"><a href="#最近因为要使用vim-所以不定期更新新学到的vim干货-所有条目都将以“-gt-gt-gt-”开头" class="headerlink" title="最近因为要使用vim,所以不定期更新新学到的vim干货.所有条目都将以“&gt;&gt;&gt;”开头"></a><label style="color:red">最近因为要使用vim,所以不定期更新新学到的vim干货.所有条目都将以“&gt;&gt;&gt;”开头</label></h2><h3 id="gt-gt-gt-sudo-apt-get-install-vim"><a href="#gt-gt-gt-sudo-apt-get-install-vim" class="headerlink" title="&gt;&gt;&gt;sudo apt-get install vim"></a>&gt;&gt;&gt;sudo apt-get install vim</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">上来先下载vim，centos可能用yum版本。</span><br><span class="line">注意有一种可能的下载失败是apt-get没有更新。</span><br></pre></td></tr></table></figure>

<h3 id="gt-gt-gt-翻页命令"><a href="#gt-gt-gt-翻页命令" class="headerlink" title="&gt;&gt;&gt;翻页命令"></a>&gt;&gt;&gt;翻页命令</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line">向上翻页：<span class="string">"ctrl+f"</span></span><br><span class="line">向下翻页：<span class="string">"ctrl+b"</span></span><br><span class="line">（f代表forward，b代表back）</span><br><span class="line">---------------------------------</span><br><span class="line">向上翻半页：<span class="string">"ctrl+u"</span></span><br><span class="line">向下翻半页：<span class="string">"ctrl+d"</span></span><br><span class="line">---------------------------------</span><br><span class="line">向上滚一行：<span class="string">"ctrl+e"</span></span><br><span class="line">向下滚一行：<span class="string">"ctrl+y"</span></span><br><span class="line">---------------------------------</span><br><span class="line"><span class="string">"zz"</span>让光标所在的行居于屏幕中间</span><br><span class="line"><span class="string">"zt"</span>让光标所在的行居于屏幕最上方（t代表top）</span><br><span class="line"><span class="string">"zb"</span>让光标所在的行居于屏幕最下方（b代表bottom）</span><br><span class="line">---------------------------------</span><br></pre></td></tr></table></figure>

<h3 id="gt-gt-gt-按字符串在文件中搜索"><a href="#gt-gt-gt-按字符串在文件中搜索" class="headerlink" title="&gt;&gt;&gt;按字符串在文件中搜索"></a>&gt;&gt;&gt;按字符串在文件中搜索</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line">从开头搜索</span><br><span class="line">在命令模式下，输入<span class="string">"/你要查找的字符"</span></span><br><span class="line">按下回车，可以看到vim把光标移动到该字符处</span><br><span class="line">再按n（小写）查看下一个匹配</span><br><span class="line">按N（大写）查看上一个匹配，</span><br><span class="line">----------------------------------</span><br><span class="line">从结尾处搜索</span><br><span class="line"><span class="string">"？要搜索的字符串或字符"</span></span><br><span class="line">其余同从开头搜索</span><br><span class="line">----------------------------------</span><br><span class="line">搜索后，打开别的文件发现也被高亮了，怎么关闭</span><br><span class="line">命令行模式下，输入：<span class="string">"nohlsearch"</span></span><br><span class="line">也可以：<span class="string">"set nohlsearch"</span> </span><br><span class="line">可以简写成<span class="string">"noh"</span>和<span class="string">"set-noh"</span></span><br></pre></td></tr></table></figure>

<h3 id="gt-gt-gt-vim跳转到指定行"><a href="#gt-gt-gt-vim跳转到指定行" class="headerlink" title="&gt;&gt;&gt;vim跳转到指定行"></a>&gt;&gt;&gt;vim跳转到指定行</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">第一种方法</span><br><span class="line">直接在命令行模式输入<span class="string">"：所要跳转的行数"</span>即可</span><br><span class="line">----------------------------------</span><br><span class="line">第二种方法可以在外面直接进入并且跳转行</span><br><span class="line"><span class="string">"vim +n filename"</span>(注意这里意思是要输入加号)</span><br></pre></td></tr></table></figure>

<h3 id="gt-gt-gt-显示行号"><a href="#gt-gt-gt-显示行号" class="headerlink" title="&gt;&gt;&gt;显示行号"></a>&gt;&gt;&gt;显示行号</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">命令模式直接：<span class="string">":set number"</span></span><br><span class="line">也可以通过设置永久显示行号，这个我回头有时间会更新在这里~~~~~~~~~~~~~~~</span><br></pre></td></tr></table></figure>

<h3 id="gt-gt-gt-新的使用干货正在出炉"><a href="#gt-gt-gt-新的使用干货正在出炉" class="headerlink" title="&gt;&gt;&gt;新的使用干货正在出炉"></a>&gt;&gt;&gt;新的使用干货正在出炉</h3>
